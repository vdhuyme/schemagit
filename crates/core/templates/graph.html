<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchemaGit Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f4f3ef;
        --surface: #ffffff;
        --surface2: #f8f7f4;
        --border: #e8e5de;
        --text: #1a1917;
        --text2: #6b6560;
        --text3: #9c9690;
        --accent: #2d2926;
        --accent-soft: #e8e5de;
        --indigo: #4338ca;
        --indigo-soft: #eef2ff;
        --indigo-border: #c7d2fe;
        --sidebar-w: 280px;
        --header-h: 56px;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.06), 0 4px 16px rgba(0, 0, 0, 0.04);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08);
      }

      [data-theme="dark"] {
        --bg: #0f0e0d;
        --surface: #1a1917;
        --surface2: #211f1d;
        --border: #2e2b28;
        --text: #f0ede8;
        --text2: #a09990;
        --text3: #6b6560;
        --accent: #f0ede8;
        --accent-soft: #2e2b28;
        --indigo: #818cf8;
        --indigo-soft: #1e1b4b;
        --indigo-border: #3730a3;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.2);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      html,
      body {
        height: 100%;
        font-family: "Syne", sans-serif;
        background: var(--bg);
        color: var(--text);
        transition:
          background 0.3s,
          color 0.3s;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── HEADER ── */
      header {
        height: var(--header-h);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        flex-shrink: 0;
        z-index: 100;
        gap: 12px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        background: var(--text);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-icon svg {
        width: 16px;
        height: 16px;
        stroke: var(--bg);
      }
      .logo-text {
        font-size: 15px;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: var(--text);
      }
      .logo-text span {
        color: var(--text3);
        font-weight: 600;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border-radius: 8px;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s;
        letter-spacing: 0.2px;
        white-space: nowrap;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-ghost {
        background: transparent;
        border-color: var(--border);
        color: var(--text2);
      }
      .btn-ghost:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .btn-primary {
        background: var(--text);
        color: var(--bg);
        border-color: var(--text);
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      /* Theme toggle */
      .theme-toggle {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .theme-toggle:hover {
        background: var(--accent-soft);
      }
      .theme-toggle svg {
        width: 16px;
        height: 16px;
        color: var(--text2);
      }

      /* Mobile menu toggle */
      .menu-toggle {
        display: none;
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .menu-toggle svg {
        width: 16px;
        height: 16px;
        color: var(--text2);
      }

      /* ── BODY ── */
      .body {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* ── SIDEBAR ── */
      aside {
        width: var(--sidebar-w);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
        transition:
          transform 0.25s ease,
          width 0.25s ease;
        z-index: 50;
      }

      .sidebar-head {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        background: var(--surface2);
      }
      .sidebar-head-label {
        font-size: 10px;
        font-weight: 800;
        color: var(--text3);
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }
      .table-count {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 500;
        color: var(--indigo);
        background: var(--indigo-soft);
        border: 1px solid var(--indigo-border);
        padding: 2px 8px;
        border-radius: 100px;
      }

      /* Search in sidebar */
      .sidebar-search {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .sidebar-search input {
        width: 100%;
        padding: 6px 10px 6px 30px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 7px;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
      }
      .sidebar-search input:focus {
        border-color: var(--indigo);
      }
      .sidebar-search input::placeholder {
        color: var(--text3);
      }
      .search-wrap {
        position: relative;
      }
      .search-icon {
        position: absolute;
        left: 8px;
        top: 50%;
        transform: translateY(-50%);
        width: 13px;
        height: 13px;
        color: var(--text3);
        pointer-events: none;
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
      }

      /* Table item */
      .table-item {
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
        cursor: pointer;
      }
      .table-item:hover {
        background: var(--surface2);
      }
      .table-item.active {
        background: var(--indigo-soft);
      }
      .table-item.active .table-name {
        color: var(--indigo);
      }

      .table-header {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .table-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .table-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .table-item.active .table-dot {
        background: var(--indigo);
      }
      .table-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.15s;
      }
      .table-meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .col-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--text3);
        white-space: nowrap;
      }
      .expand-btn {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text3);
        transition:
          transform 0.2s,
          color 0.15s;
      }
      .expand-btn svg {
        width: 12px;
        height: 12px;
      }
      .table-item.expanded .expand-btn {
        transform: rotate(180deg);
        color: var(--indigo);
      }

      /* Fields panel */
      .fields-panel {
        display: none;
        padding: 0 16px 12px 33px;
      }
      .table-item.expanded .fields-panel {
        display: block;
      }
      .field-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 8px;
        border-radius: 6px;
        gap: 8px;
      }
      .field-row:hover {
        background: var(--accent-soft);
      }
      .field-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--text);
        font-weight: 500;
      }
      .field-type {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--text3);
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 1px 6px;
        border-radius: 4px;
        white-space: nowrap;
      }
      .field-pk {
        font-size: 9px;
        font-weight: 800;
        color: var(--indigo);
        background: var(--indigo-soft);
        padding: 1px 5px;
        border-radius: 4px;
        letter-spacing: 0.5px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text3);
      }

      /* ── CANVAS ── */
      .canvas {
        flex: 1;
        overflow: hidden;
        position: relative;
        background: var(--bg);
      }

      .canvas-bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: radial-gradient(var(--text3) 1px, transparent 1px);
        background-size: 28px 28px;
        opacity: 0.06;
      }

      /* Zoom controls */
      .zoom-controls {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 10;
      }
      .zoom-btn {
        width: 34px;
        height: 34px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "JetBrains Mono", monospace;
        font-size: 16px;
        color: var(--text2);
        font-weight: 500;
        transition: all 0.15s;
        box-shadow: var(--shadow);
      }
      .zoom-btn:hover {
        background: var(--surface2);
        color: var(--text);
      }
      .zoom-level {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 5px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--text2);
        text-align: center;
        box-shadow: var(--shadow);
      }

      /* Diagram wrapper - pan/zoom container */
      #canvas-area {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        cursor: grab;
      }
      #canvas-area:active {
        cursor: grabbing;
      }
      #diagram-container {
        position: absolute;
        transform-origin: 0 0;
        will-change: transform;
      }
      .mermaid-wrap {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 40px;
        box-shadow: var(--shadow-lg);
        min-width: 300px;
      }
      .mermaid {
        display: flex;
        justify-content: center;
      }

      /* Highlight overlay for table node */
      .node-highlight {
        animation: pulseHighlight 1.5s ease-out forwards;
      }
      @keyframes pulseHighlight {
        0% {
          filter: drop-shadow(0 0 0 transparent);
        }
        40% {
          filter: drop-shadow(0 0 8px #4338ca88);
        }
        100% {
          filter: drop-shadow(0 0 0 transparent);
        }
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--text);
        color: var(--bg);
        padding: 10px 20px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.3px;
        opacity: 0;
        pointer-events: none;
        transition: all 0.25s;
        z-index: 999;
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* Sidebar overlay on mobile */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 40;
        backdrop-filter: blur(2px);
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 1024px) {
        /* collapse sidebar on tablet or smaller */
        aside {
          transform: translateX(-100%);
          position: fixed;
          left: 0;
          top: var(--header-h);
          height: calc(100vh - var(--header-h));
          box-shadow: var(--shadow-lg);
          width: var(--sidebar-w);
        }
        aside.open {
          transform: translateX(0);
        }
        .sidebar-overlay {
          display: none;
        }
        .sidebar-overlay.open {
          display: block;
        }
        .menu-toggle {
          display: flex;
        }
      }
      @media (max-width: 768px) {
        :root {
          --sidebar-w: 300px;
        }
        .menu-toggle {
          display: flex;
        }
        .logo-text {
          font-size: 14px;
        }
        aside {
          position: fixed;
          left: 0;
          top: var(--header-h);
          height: calc(100vh - var(--header-h));
          transform: translateX(-100%);
          box-shadow: var(--shadow-lg);
        }
        aside.open {
          transform: translateX(0);
        }
        .sidebar-overlay.open {
          display: block;
        }
        .btn span {
          display: none;
        }
        .btn {
          padding: 7px 10px;
        }
      }

      @media (max-width: 480px) {
        header {
          padding: 0 12px;
        }
        .zoom-controls {
          bottom: 12px;
          right: 12px;
        }
      }

      /* Mermaid dark mode overrides */
      [data-theme="dark"] .mermaid-wrap {
        filter: invert(0);
      }
      [data-theme="dark"] .mermaid svg .label {
        fill: #f0ede8 !important;
      }
    </style>
  </head>
  <body>
    <script id="schema-data" type="application/json">
      {{ schema_json | safe }}
    </script>
    <div class="app">
      <!-- HEADER -->
      <header>
        <div style="display: flex; align-items: center; gap: 10px">
          <button class="menu-toggle" id="menuToggle" title="Toggle sidebar">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"
              />
            </svg>
          </button>
          <div class="logo">
            <div class="logo-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
                />
              </svg>
            </div>
            <div class="logo-text">SchemaGit <span>Explorer</span></div>
          </div>
        </div>

        <div class="header-actions">
          <button
            class="theme-toggle"
            id="themeToggle"
            title="Toggle dark mode"
          >
            <svg
              id="themeIcon"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
              />
            </svg>
          </button>
          <button class="btn btn-ghost" id="resetZoomBtn">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 4v6h6M20 20v-6h-6M4 20l7-7M20 4l-7 7"
              />
            </svg>
            <span>Fit</span>
          </button>
          <button class="btn btn-primary" id="downloadBtn">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              stroke-width="2"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
              />
            </svg>
            <span>Download PDF</span>
          </button>
        </div>
      </header>

      <!-- BODY -->
      <div class="body">
        <!-- Sidebar overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- SIDEBAR -->
        <aside id="sidebar">
          <div class="sidebar-head">
            <span class="sidebar-head-label">Schema Tables</span>
            <span class="table-count" id="tableCount">0 tables</span>
          </div>
          <div class="sidebar-search">
            <div class="search-wrap">
              <svg
                class="search-icon"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path stroke-linecap="round" d="M21 21l-4.35-4.35" />
              </svg>
              <input
                type="text"
                id="searchInput"
                placeholder="Search tables…"
              />
            </div>
          </div>
          <div class="sidebar-list" id="tableList">
            <!-- Populated by JS -->
          </div>
        </aside>

        <!-- CANVAS -->
        <div class="canvas">
          <div class="canvas-bg"></div>

          <div id="canvas-area">
            <div id="diagram-container">
              <div class="mermaid-wrap">
                <div class="mermaid" id="mermaidEl">{{ mermaid | safe }}</div>
              </div>
            </div>
          </div>

          <!-- Zoom controls -->
          <div class="zoom-controls">
            <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
            <div class="zoom-level" id="zoomLabel">100%</div>
            <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
      /* ─────────────────────────────────────────────────────────────
      GLOBAL ZOOM STATE
      ───────────────────────────────────────────────────────────── */

      let scale = 1;
      let tx = 40;
      let ty = 40;

      let container = null;
      let zoomLabel = null;

      /* ─────────────────────────────────────────────────────────────
      HELPERS
      ───────────────────────────────────────────────────────────── */

      function applyTransform() {
        if (!container) return;

        container.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;

        if (zoomLabel) {
          zoomLabel.textContent = Math.round(scale * 100) + "%";
        }
      }

      function parseSchema() {
        const el = document.getElementById("schema-data");

        if (!el) return [];

        try {
          return JSON.parse(el.textContent || "[]");
        } catch (e) {
          console.error("schema parse error", e);
          return [];
        }
      }

      /* ─────────────────────────────────────────────────────────────
      SIDEBAR TABLE LIST
      ───────────────────────────────────────────────────────────── */

      function renderTables(schema) {
        const tableList = document.getElementById("tableList");
        const tableCount = document.getElementById("tableCount");
        const searchInput = document.getElementById("searchInput");

        if (!tableList) return;

        tableList.innerHTML = "";
        tableCount.textContent = `${schema.length} tables`;

        function build(table) {
          const cols = Array.isArray(table.columns) ? table.columns : [];

          const item = document.createElement("div");
          item.className = "table-item";

          const fieldsHtml = cols
            .map(
              (f) => `
                <div class="field-row">
                  <span class="field-name">${f.name}</span>

                  <span style="display:flex;align-items:center;gap:4px;">

                    ${f.is_primary ? '<span class="field-pk">PK</span>' : ""}

                    <span class="field-type">${f.data_type}</span>

                  </span>

                </div>
              `,
            )
            .join("");

          item.innerHTML = `
                          <div class="table-header">

                            <div class="table-header-left">

                              <div class="table-dot"></div>

                              <span class="table-name">${table.name}</span>

                            </div>

                            <div class="table-meta">

                              <span class="col-badge">${cols.length} col</span>

                              <div class="expand-btn">
                                ▼
                              </div>

                            </div>

                          </div>

                          <div class="fields-panel">
                            ${fieldsHtml}
                          </div>
                        `;

          item.querySelector(".table-header").addEventListener("click", () => {
            const was = item.classList.contains("expanded");

            document
              .querySelectorAll(".table-item")
              .forEach((i) => i.classList.remove("expanded", "active"));

            if (!was) {
              item.classList.add("expanded", "active");

              highlightNode(table.name);
            }
          });

          return item;
        }

        function filter(q) {
          tableList.innerHTML = "";

          schema
            .filter((t) => t.name.toLowerCase().includes(q))
            .forEach((t) => tableList.appendChild(build(t)));
        }

        filter("");

        if (searchInput) {
          searchInput.addEventListener("input", (e) => {
            filter(e.target.value.toLowerCase());
          });
        }
      }

      /* ─────────────────────────────────────────────────────────────
      MERMAID RENDER
      ───────────────────────────────────────────────────────────── */

      async function renderMermaid() {
        const el = document.getElementById("mermaidEl");

        if (!el) {
          console.error("Mermaid element not found");
          return;
        }

        const code = el.textContent.trim();

        if (!code) {
          console.error("No mermaid code found");
          return;
        }

        try {
          // Initialize mermaid with theme settings
          mermaid.initialize({
            startOnLoad: false,
            securityLevel: "loose",
            theme:
              document.documentElement.getAttribute("data-theme") === "dark"
                ? "dark"
                : "default",
            flowchart: {
              useMaxWidth: false,
              htmlLabels: true,
              curve: "basis",
            },
          });

          console.log("Rendering mermaid code:", code);

          // Create a temporary container for rendering
          const tempDiv = document.createElement("div");
          tempDiv.style.display = "none";
          document.body.appendChild(tempDiv);

          // Render the mermaid diagram
          const renderResult = await mermaid.render(
            "schema-diagram",
            code,
            tempDiv,
          );

          // Extract SVG content
          let svgContent = "";
          if (typeof renderResult === "object" && renderResult.svg) {
            svgContent = renderResult.svg;
          } else if (typeof renderResult === "string") {
            svgContent = renderResult;
          } else {
            // Fallback: get SVG from rendered element
            const svgElement = tempDiv.querySelector("svg");
            if (svgElement) {
              svgContent = svgElement.outerHTML;
            }
          }

          // Clean up temp element
          document.body.removeChild(tempDiv);

          if (!svgContent) {
            throw new Error("Could not extract SVG content from render result");
          }

          // Replace content with rendered SVG
          el.innerHTML = svgContent;

          // Fix text color to match theme
          fixMermaidStyles();

          // Fit diagram to canvas
          setTimeout(fitDiagram, 200);
        } catch (e) {
          console.error("Mermaid render error:", e);
          console.error("Mermaid code was:", code);
          el.innerHTML = `<div style="color: var(--text2); padding: 20px; font-size: 12px; background: var(--surface2); border-radius: 8px;">
            <strong>Diagram Error:</strong> ${e.message || "Failed to render diagram"}<br>
            <small style="margin-top: 10px; display: block;">Check console for details</small>
          </div>`;
        }
      }

      function fixMermaidStyles() {
        const svg = document.querySelector(".mermaid svg");

        if (!svg) return;

        // Fix text color based on theme
        const textColor = getComputedStyle(document.documentElement)
          .getPropertyValue("--text")
          .trim();
        svg.querySelectorAll("text, tspan").forEach((el) => {
          el.style.fill = textColor || "currentColor";
          el.style.color = textColor || "currentColor";
        });
      }

      /* ─────────────────────────────────────────────────────────────
      NODE HIGHLIGHT
      ───────────────────────────────────────────────────────────── */

      function highlightNode(name) {
        const svg = document.querySelector(".mermaid svg");

        if (!svg) return;

        svg
          .querySelectorAll(".node-highlight")
          .forEach((e) => e.classList.remove("node-highlight"));

        svg.querySelectorAll("text").forEach((el) => {
          if (el.textContent.trim() === name) {
            const g = el.closest("g");

            if (g) {
              g.classList.add("node-highlight");

              setTimeout(() => {
                g.classList.remove("node-highlight");
              }, 1500);
            }
          }
        });
      }

      /* ─────────────────────────────────────────────────────────────
      ZOOM + PAN
      ───────────────────────────────────────────────────────────── */

      function initZoom() {
        const canvasArea = document.getElementById("canvas-area");

        container = document.getElementById("diagram-container");

        zoomLabel = document.getElementById("zoomLabel");

        let dragging = false;
        let startX, startY, startTx, startTy;

        function zoom(delta, cx, cy) {
          const prev = scale;

          scale = Math.min(3, Math.max(0.2, scale + delta));

          const ratio = scale / prev;

          tx = cx - ratio * (cx - tx);
          ty = cy - ratio * (cy - ty);

          applyTransform();
        }

        canvasArea.addEventListener(
          "wheel",
          (e) => {
            e.preventDefault();

            const r = canvasArea.getBoundingClientRect();

            zoom(
              e.deltaY < 0 ? 0.1 : -0.1,
              e.clientX - r.left,
              e.clientY - r.top,
            );
          },
          { passive: false },
        );

        canvasArea.addEventListener("mousedown", (e) => {
          if (e.button !== 0) return;

          dragging = true;

          startX = e.clientX;
          startY = e.clientY;

          startTx = tx;
          startTy = ty;
        });

        window.addEventListener("mousemove", (e) => {
          if (!dragging) return;

          tx = startTx + (e.clientX - startX);
          ty = startTy + (e.clientY - startY);

          applyTransform();
        });

        window.addEventListener("mouseup", () => (dragging = false));

        applyTransform();
      }

      /* ─────────────────────────────────────────────────────────────
      FIT DIAGRAM
      ───────────────────────────────────────────────────────────── */

      function fitDiagram() {
        const svg = document.querySelector(".mermaid svg");

        if (!svg) return;

        const canvas = document.getElementById("canvas-area");

        const cw = canvas.clientWidth;
        const ch = canvas.clientHeight;

        const dw = svg.scrollWidth + 80;
        const dh = svg.scrollHeight + 80;

        scale = Math.min(1, Math.min((cw - 80) / dw, (ch - 80) / dh));

        tx = (cw - dw * scale) / 2;
        ty = (ch - dh * scale) / 2;

        applyTransform();
      }

      /* ─────────────────────────────────────────────────────────────
      PDF DOWNLOAD
      ───────────────────────────────────────────────────────────── */

      function initDownload() {
        const btn = document.getElementById("downloadBtn");

        if (!btn) return;

        btn.addEventListener("click", async () => {
          try {
            const el = document.getElementById("diagram-container");

            const canvas = await html2canvas(el, {
              backgroundColor: "#ffffff",
              scale: 2,
            });

            const img = canvas.toDataURL("image/png");

            const { jsPDF } = window.jspdf;

            const pdf = new jsPDF({
              orientation: "landscape",
            });

            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;

            pdf.addImage(img, "PNG", 0, 0, w, h);

            pdf.save("schema.pdf");
          } catch (e) {
            console.error(e);
          }
        });
      }

      /* ─────────────────────────────────────────────────────────────
      THEME
      ───────────────────────────────────────────────────────────── */

      function initTheme() {
        const html = document.documentElement;
        const themeToggle = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");

        const saved = localStorage.getItem("schemagit_theme") || "light";
        html.setAttribute("data-theme", saved);

        // Update icon based on current theme
        updateThemeIcon(saved);

        // Theme toggle handler
        if (themeToggle) {
          themeToggle.addEventListener("click", () => {
            const current = html.getAttribute("data-theme") || "light";
            const newTheme = current === "light" ? "dark" : "light";

            html.setAttribute("data-theme", newTheme);
            localStorage.setItem("schemagit_theme", newTheme);
            updateThemeIcon(newTheme);

            // Re-render mermaid with new theme
            setTimeout(() => renderMermaid(), 100);
          });
        }
      }

      function updateThemeIcon(theme) {
        const themeIcon = document.getElementById("themeIcon");
        if (!themeIcon) return;

        // Change icon based on theme
        const isDark = theme === "dark";
        themeIcon.innerHTML = isDark
          ? `<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />`
          : `<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;
      }

      /* ─────────────────────────────────────────────────────────────
      SIDEBAR TOGGLE
      ───────────────────────────────────────────────────────────── */

      function initSidebarToggle() {
        const sidebar = document.getElementById("sidebar");
        const menuToggle = document.getElementById("menuToggle");
        const sidebarOverlay = document.getElementById("sidebarOverlay");

        if (!menuToggle) return;

        menuToggle.addEventListener("click", () => {
          sidebar.classList.toggle("open");
          sidebarOverlay.classList.toggle("open");
        });

        if (sidebarOverlay) {
          sidebarOverlay.addEventListener("click", () => {
            sidebar.classList.remove("open");
            sidebarOverlay.classList.remove("open");
          });
        }
      }

      /* ─────────────────────────────────────────────────────────────
      INITIALIZATION
      ───────────────────────────────────────────────────────────── */

      function initSchema() {
        const schema = parseSchema();

        renderTables(schema);

        renderMermaid();

        initSidebarToggle();

        initZoom();

        initDownload();
      }

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();

        initSchema();
      });
    </script>
  </body>
</html>
