<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchemaGit Graph Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mermaid { display: flex; justify-content: center; width: 100%; height: auto; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center z-10 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-2 rounded-lg">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-gray-900 leading-tight">SchemaGit <span class="font-normal text-gray-500">Explorer</span></h1>
                <p class="text-[10px] text-gray-400 font-mono uppercase tracking-tighter">Interactive Meta-Graph</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex gap-2 text-xs">
                <span class="flex items-center gap-1.5 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-600 font-medium transition-colors cursor-pointer border border-transparent">
                    <svg class="w-3.5 h-3.5 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M5 4a2 2 0 012-2h6a2 2 0 012 2v14l-5-2.5L5 18V4z"></path></svg>
                    Snapshot Latest
                </span>
            </div>
            <div class="h-6 w-px bg-gray-200"></div>
            <button class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-semibold shadow-sm shadow-indigo-200 transition-all active:scale-95">Download PDF</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar - Table Explorer -->
        <aside class="w-72 bg-white border-r border-gray-100 overflow-y-auto flex flex-col shadow-[1px_0_10px_rgba(0,0,0,0.02)]">
            <div class="p-4 border-b border-gray-50 bg-gray-50/30 flex items-center justify-between sticky top-0 z-10 backdrop-blur-md">
                <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">Metadata Panel</h2>
                <span class="text-[10px] font-mono text-indigo-500 font-bold bg-indigo-50 px-1.5 rounded">{{ tables.len() }} tables</span>
            </div>
            <div class="divide-y divide-gray-50">
                {% for table in tables %}
                <div class="p-4 hover:bg-indigo-50/30 transition-all duration-200 group cursor-pointer relative overflow-hidden">
                    <div class="flex items-center gap-3 relative z-10">
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-300 group-hover:bg-indigo-500 transition-colors shrink-0"></div>
                        <h3 class="text-sm font-semibold text-gray-700 group-hover:text-indigo-900 transition-colors truncate">{{ table.name }}</h3>
                    </div>
                    <div class="mt-2 ml-4.5 flex items-center gap-3 text-[10px] font-medium text-gray-400">
                        <span class="flex items-center gap-1">
                             <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"></path></svg>
                             {{ table.columns_count }} columns
                        </span>
                        <span class="opacity-0 group-hover:opacity-100 text-indigo-500 font-bold transition-opacity">View Fields</span>
                    </div>
                </div>
                {% endfor %}
            </div>
        </aside>

        <!-- Canvas - Mermaid Graph -->
        <div class="flex-1 overflow-auto relative bg-[#fafafa]">
            <!-- Background Grid -->
            <div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: radial-gradient(#4f46e5 1px, transparent 1px); background-size: 24px 24px;"></div>
            
            <div class="p-12 relative min-h-full flex justify-center">
                <div class="mermaid-container bg-white p-10 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.04)] border border-gray-100/50">
                    <div class="mermaid">
                        {{ mermaid }}
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        mermaid.initialize({
            startOnLoad: true,
            theme: 'base',
            themeVariables: {
                primaryColor: '#6366f1',
                primaryTextColor: '#fff',
                primaryBorderColor: '#4f46e5',
                lineColor: '#94a3b8',
                secondaryColor: '#f8fafc',
                tertiaryColor: '#fff',
                mainBkg: '#fff',
                nodeBorder: '#e2e8f0',
                clusterBkg: '#f1f5f9',
                clusterBorder: '#cbd5e1',
                defaultLinkColor: '#94a3b8',
                fontFamily: 'Inter'
            },
            er: {
                useMaxWidth: false,
                diagramPadding: 20,
                layoutDirection: 'LR',
                minEntityWidth: 140,
                minEntityHeight: 40,
                entityPadding: 15
            }
        });
    </script>
</body>
</html>
